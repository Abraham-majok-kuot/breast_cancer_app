name: Build and Deploy to Firebase App Distribution

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Set up Java
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Set up Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'

      # 4. Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 5. Decode and validate google-services.json from secret
      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "ERROR: GOOGLE_SERVICES_JSON secret is not set."
            echo "Go to: GitHub repo → Settings → Secrets → Actions → New secret"
            echo "Name:  GOOGLE_SERVICES_JSON"
            echo "Value: base64-encoded content of your android/app/google-services.json"
            echo "Run this locally to get the value:  base64 -w 0 android/app/google-services.json"
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json
          # Validate the decoded file is well-formed JSON
          python3 -c "import json,sys; json.load(open('android/app/google-services.json'))" \
            && echo "google-services.json is valid JSON" \
            || { echo "ERROR: Decoded google-services.json is malformed. Re-encode the file."; exit 1; }

      # 6. Build release APK
      - name: Build APK
        run: flutter build apk --release

      # 7. Upload to Firebase App Distribution
      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: testers
          file: build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: "Latest build from main branch"
